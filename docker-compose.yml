version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: optix-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - OPTIX_POSTGRES_USER=user
      - OPTIX_POSTGRES_PASSWORD=password
      - OPTIX_POSTGRES_DB=optix
      - OPTIX_POSTGRES_HOST=db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-default-secret-key}
    restart: always

  frontend:
    build:
      context: ./frontend/options-analytics-dashboard
      dockerfile: Dockerfile.frontend
    container_name: optix-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always
